<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samachar — News Dashboard</title>
<link rel="icon" href="icon.svg" type="image/svg+xml">
<meta name="theme-color" content="#B85C00">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Samachar">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin="anonymous">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Sans:wght@400;500&display=swap">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="logo">Samachar<span>.</span></div>
    <div class="header-right">
      <span class="auto-pill">⟳ auto 15 min</span>
      <span class="last-updated" id="lastUpdated"></span>
      <div class="lang-toggle" id="langToggle"></div>
      <button class="refresh-btn" id="refreshBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Refresh
      </button>
    </div>
  </div>
  <div class="filter-row" id="filterRow"></div>
</header>

<main class="main">
  <div class="section-bar">
    <span class="section-label" id="sectionLabel">All categories</span>
    <span class="unread-pill" id="unreadPill" hidden></span>
  </div>
  <div id="content"></div>
  <div class="mobile-stack" id="mobileStack"></div>
</main>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-sources" id="footerSources">
      News sourced from <a href="https://www.thehindu.com" target="_blank" rel="noopener noreferrer">The Hindu</a>
      &amp; <a href="https://indianexpress.com" target="_blank" rel="noopener noreferrer">Indian Express</a>
    </div>
    <div class="footer-mii">Made in India</div>
  </div>
</footer>

<script src="app.js"></script>
</body>
</html>
