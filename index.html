<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samachar — News Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23B85C00'/><text x='16' y='23' font-size='20' font-family='Georgia,serif' font-weight='700' text-anchor='middle' fill='white'>S</text></svg>">
<meta name="theme-color" content="#B85C00">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Samachar">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #FAFAF8; --surface: #FFFFFF; --border: #E5E3DC; --border-hover: #C8C5BB;
    --text-primary: #1A1A18; --text-secondary: #5C5B56; --text-muted: #9A9890;
    --accent: #B85C00;
    --unread-bg: #F0F7F1; --unread-border: #A8D5B0; --unread-hover: #81C784;
    --hindu-bg: #FFF3E0; --hindu-text: #BF360C;
    --ie-bg: #E3F2FD; --ie-text: #0D47A1;
    --au-bg: #E8F5E9; --au-text: #2E7D32;
    --bbc-bg: #FDECEA; --bbc-text: #C62828;
    --bhaskar-bg: #EDE7F6; --bhaskar-text: #4527A0;
    --new-bg: #E8F5E9; --new-text: #2E7D32; --new-dot: #43A047;
    --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px;
  }
  body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; }

  /* Header */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; padding: 0 1.5rem; }
  .header-top { display: flex; align-items: center; justify-content: space-between; padding: 0.9rem 0 0.75rem; gap: 12px; }
  .logo { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .auto-pill { font-size: 11px; background: #FFF8E1; color: #F57F17; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
  .last-updated { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .refresh-btn { display: flex; align-items: center; gap: 5px; font-size: 12px; font-family: inherit; font-weight: 500; color: var(--text-secondary); background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 5px 12px; cursor: pointer; transition: all .15s; }
  .refresh-btn:hover { background: var(--bg); border-color: var(--border-hover); }
  .refresh-btn.spinning svg { animation: spin .8s linear infinite; }
  .lang-toggle { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; flex-shrink: 0; }
  .lang-btn { font-size: 11px; font-family: inherit; font-weight: 500; padding: 4px 10px; background: none; border: none; color: var(--text-secondary); cursor: pointer; transition: all .15s; white-space: nowrap; }
  .lang-btn.active { background: var(--accent); color: #fff; }
  .lang-btn:hover:not(.active) { background: var(--border); }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; padding-bottom: .7rem; }
  .pill { font-size: 12px; font-family: inherit; font-weight: 500; padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text-secondary); cursor: pointer; transition: all .15s; }
  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Main */
  .main { max-width: 1280px; margin: 0 auto; padding: 1.25rem 1.5rem 2rem; }
  .section-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: .9rem; }
  .section-label { font-size: 11px; letter-spacing: .8px; text-transform: uppercase; color: var(--text-muted); font-weight: 500; }
  .unread-pill { font-size: 11px; background: var(--new-bg); color: var(--new-text); padding: 3px 9px; border-radius: 20px; font-weight: 500; }

  /* Cards */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 14px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem 1.1rem .85rem; cursor: pointer; transition: border-color .15s, box-shadow .15s, background .2s; display: flex; flex-direction: column; animation: fadeIn .2s ease both; }
  .card:hover { border-color: var(--border-hover); box-shadow: 0 2px 12px rgba(0,0,0,.06); }
  .card.unread { background: var(--unread-bg); border-color: var(--unread-border); }
  .card.unread:hover { border-color: var(--unread-hover); }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; margin-bottom: .55rem; }
  .badges { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
  .badge { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; }
  .badge-hindu { background: var(--hindu-bg); color: var(--hindu-text); }
  .badge-ie { background: var(--ie-bg); color: var(--ie-text); }
  .badge-au { background: var(--au-bg); color: var(--au-text); }
  .badge-bbc { background: var(--bbc-bg); color: var(--bbc-text); }
  .badge-bhaskar { background: var(--bhaskar-bg); color: var(--bhaskar-text); }
  .badge-cat { background: #F3F3F0; color: var(--text-secondary); }
  .new-badge { display: flex; align-items: center; gap: 4px; font-size: 9px; font-weight: 600; background: var(--new-bg); color: var(--new-text); padding: 2px 7px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
  .new-dot { width: 5px; height: 5px; background: var(--new-dot); border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }

  .card-title { font-size: 13.5px; font-weight: 500; line-height: 1.45; color: var(--text-primary); margin-bottom: .5rem; }
  .card-summary { font-size: 12.5px; line-height: 1.65; color: var(--text-secondary); flex: 1; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: .75rem; padding-top: .65rem; border-top: 1px solid var(--border); }
  .card-time { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
  .read-link { font-size: 11px; font-weight: 500; color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 3px; }
  .read-link:hover { text-decoration: underline; }

  /* Pagination */
  .pagination { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 1.5rem; }
  .page-btn { font-size: 12px; font-family: inherit; padding: 6px 13px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text-secondary); cursor: pointer; transition: all .15s; }
  .page-btn:hover:not(:disabled) { background: var(--bg); border-color: var(--border-hover); }
  .page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .page-btn:disabled { opacity: .35; cursor: default; }
  .page-ellipsis { font-size: 12px; color: var(--text-muted); padding: 0 4px; }

  /* States */
  .state-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 4rem 1rem; text-align: center; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .75s linear infinite; }
  .state-title { font-size: 15px; font-weight: 500; color: var(--text-primary); }
  .state-sub { font-size: 13px; color: var(--text-muted); max-width: 400px; line-height: 1.6; }
  .error-box { background: #FFF5F5; border: 1px solid #FECACA; border-radius: var(--radius-md); padding: 1.4rem 1.5rem; font-size: 13px; color: #991B1B; max-width: 520px; line-height: 1.8; text-align: left; }
  .error-box strong { display: block; margin-bottom: 8px; font-size: 14px; }
  .error-box code { font-size: 12px; background: #fff; padding: 2px 6px; border-radius: 4px; border: 1px solid #FECACA; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  @media(max-width:600px){
    .header,.main { padding-left:1rem; padding-right:1rem; }
    .logo { font-size: 20px; }
    .header-right .auto-pill, .header-right .last-updated { display: none; }
    .grid { display: none; }
    .pagination { display: none; }
    .mobile-stack { display: block; }
    .footer-inner { justify-content: center; text-align: center; }
    .footer { padding: 1rem; }
  }

  /* ── Mobile card stack ───────────────────────────────────────────────── */
  /* Hidden on desktop, shown by the @media block above on mobile */
  @media(min-width:601px) { .mobile-stack { display: none; } }
  .mobile-stack { position: relative; padding-bottom: 28px; }
  .scard {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.2rem 1.2rem 1rem;
    will-change: transform; user-select: none; -webkit-user-select: none;
    position: relative; z-index: 3; display: flex; flex-direction: column;
  }
  .scard.unread { background: var(--unread-bg); border-color: var(--unread-border); }
  .scard-behind {
    position: absolute; border: 1px solid var(--border);
    border-radius: var(--radius-lg); top: 0; pointer-events: none;
  }
  .scard-b1 { left: 8px; right: 8px; bottom: 10px; z-index: 2; background: var(--surface); }
  .scard-b2 { left: 16px; right: 16px; bottom: 0; z-index: 1; background: var(--bg); }
  .swipe-hint { text-align: center; font-size: 10px; color: var(--text-muted); margin-top: .8rem; letter-spacing: .3px; }
  .stack-counter { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 10px; }

  /* ── End-of-feed card ───────────────────────────────────────────────── */
  .scard-done { justify-content: center; align-items: center; text-align: center; padding: 2.5rem 1.5rem; min-height: 300px; gap: .75rem; }
  .done-icon { font-size: 32px; margin-bottom: .25rem; }
  .done-title { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; color: var(--text-primary); }
  .done-sub { font-size: 12.5px; color: var(--text-muted); line-height: 1.7; }

  /* ── Footer ──────────────────────────────────────────────────────────── */
  .footer { border-top: 1px solid var(--border); background: var(--surface); padding: 1.25rem 1.5rem; margin-top: 2rem; }
  .footer-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .footer-sources { font-size: 11px; color: var(--text-muted); line-height: 1.6; }
  .footer-sources a { color: var(--text-secondary); text-decoration: none; font-weight: 500; }
  .footer-sources a:hover { color: var(--accent); }
  .footer-mii { font-size: 11px; color: var(--text-muted); font-weight: 500; letter-spacing: .3px; }
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="logo">Samachar<span>.</span></div>
    <div class="header-right">
      <span class="auto-pill">⟳ auto 15 min</span>
      <span class="last-updated" id="lastUpdated"></span>
      <div class="lang-toggle" id="langToggle"></div>
      <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Refresh
      </button>
    </div>
  </div>
  <div class="filter-row" id="filterRow"></div>
</header>

<main class="main">
  <div class="section-bar">
    <span class="section-label" id="sectionLabel">All categories</span>
    <span class="unread-pill" id="unreadPill" style="display:none"></span>
  </div>
  <div id="content"></div>
  <div class="mobile-stack" id="mobileStack"></div>
</main>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-sources" id="footerSources">
      News sourced from <a href="https://www.thehindu.com" target="_blank" rel="noopener">The Hindu</a>
      &amp; <a href="https://indianexpress.com" target="_blank" rel="noopener">Indian Express</a>
    </div>
    <div class="footer-mii">Made in India</div>
  </div>
</footer>

<script>
const CATEGORIES = ['All','History','Geography','Polity','Economy','Environment','Science','Finance','Sports','Entertainment','Current Affairs'];
const PER_PAGE = 8;
const RECENT_HOURS = 6;
const SERVER = '';

let allArticles = [];
let readSet = (() => { try { return new Set(JSON.parse(localStorage.getItem('samachar_read') || '[]')); } catch { return new Set(); } })();
let activeFilter = 'All';
let currentPage = 1;
let stackIdx = 0;
let stackHistory = [];
let showCaughtUp = false;
let currentLang = (() => { const l = localStorage.getItem('samachar_lang'); return l === 'hi' ? 'hi' : 'en'; })();

// ── Helpers ───────────────────────────────────────────────────────────────
function saveRead() { localStorage.setItem('samachar_read', JSON.stringify([...readSet])); }

function formatTime(d) {
  if (!d) return '';
  const date = new Date(d);
  if (isNaN(date)) return '';
  const now   = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yest  = new Date(today - 86400000);
  const day   = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const t     = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  if (day.getTime() === today.getTime()) return 'Today, ' + t;
  if (day.getTime() === yest.getTime())  return 'Yesterday, ' + t;
  return date.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ', ' + t;
}
function isRecent(d) { return d && (Date.now() - new Date(d)) < RECENT_HOURS * 3600000; }

function guessCategory(title, desc) {
  const t = (title + ' ' + desc).toLowerCase();
  if (/history|heritage|ancient|medieval|mughal|colonial|freedom fighter|independence|partition|archaeological|monument/.test(t)) return 'History';
  if (/geography|river|mountain|monsoon|terrain|coastal|delta|plateau|drought|flood|earthquake|cyclone/.test(t)) return 'Geography';
  if (/constitution|parliament|election|supreme court|judiciary|legislation|bill passed|lok sabha|rajya sabha|governor|amendment|fundamental rights/.test(t)) return 'Polity';
  if (/economy|gdp|inflation|rbi|budget|fiscal|trade deficit|growth rate|rupee|export|import|wto|imf|world bank/.test(t)) return 'Economy';
  if (/environment|forest|wildlife|pollution|climate change|carbon|emission|biodiversity|species|wetland|tiger|national park|solar|renewable/.test(t)) return 'Environment';
  if (/science|technology|space|isro|nasa|research|discovery|innovation|artificial intelligence|satellite|nuclear|vaccine|disease|genome|quantum/.test(t)) return 'Science';
  if (/stock|sensex|nifty|sebi|insurance|mutual fund|npa|interest rate|gst|income tax|direct tax|bond|ipo/.test(t)) return 'Finance';
  if (/cricket|ipl|\bbcci\b|\bt20\b|test match|\bodi\b|\bicc\b|world cup|virat kohli|rohit sharma|ms dhoni|jasprit bumrah|shubman gill|\btennis\b|wimbledon|us open|french open|australian open|djokovic|carlos alcaraz|\bbadminton\b|pv sindhu|saina nehwal|kidambi srikanth|\bfifa\b|\bisl\b|premier league|bundesliga|champions league|la liga|hockey india|\bfih\b|pro kabaddi|\bkabaddi\b|\bolympics\b|\bparalympics\b|asian games|commonwealth games|gold medal|silver medal|bronze medal|neeraj chopra|mary kom|bajrang punia|chess olympiad|chess championship|boxing championship|boxing title|wrestling championship|athletics championship|\bgolf\b/.test(t)) return 'Sports';
  if (/bollywood|box.?office|national film award|filmfare|\biifa\b|\boscars?\b|\bbafta\b|golden globe|\bott\b|\bnetflix\b|amazon prime video|disney\+|hotstar|zee5|sony liv|\bbigg boss\b|reality show|web series|music album|\bgrammy\b|film director|movie release|film release|television serial|entertainment industry|celebrity|blockbuster|streaming platform|trailer launch|award ceremony/.test(t)) return 'Entertainment';
  return 'Current Affairs';
}

// ── Language ──────────────────────────────────────────────────────────────
function setLang(lang) {
  if (lang === currentLang) return;
  currentLang = lang;
  localStorage.setItem('samachar_lang', lang);
  activeFilter = 'All';
  currentPage = 1; stackIdx = 0; stackHistory = []; showCaughtUp = false;
  renderLangToggle();
  renderFilters();
  updateFooter();
  loadAll();
}
function renderLangToggle() {
  document.getElementById('langToggle').innerHTML =
    `<button class="lang-btn${currentLang === 'en' ? ' active' : ''}" onclick="setLang('en')">EN</button>` +
    `<button class="lang-btn${currentLang === 'hi' ? ' active' : ''}" onclick="setLang('hi')">हिं</button>`;
}
function updateFooter() {
  const el = document.getElementById('footerSources');
  if (currentLang === 'hi') {
    el.innerHTML = 'समाचार स्रोत: <a href="https://www.bbc.com/hindi" target="_blank" rel="noopener">BBC हिंदी</a> &amp; <a href="https://www.bhaskar.com" target="_blank" rel="noopener">दैनिक भास्कर</a>';
  } else {
    el.innerHTML = 'News sourced from <a href="https://www.thehindu.com" target="_blank" rel="noopener">The Hindu</a> &amp; <a href="https://indianexpress.com" target="_blank" rel="noopener">Indian Express</a>';
  }
}

// ── Load ──────────────────────────────────────────────────────────────────
async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning'); btn.disabled = true;
  showLoading();
  try {
    const res = await fetch(SERVER + '/api/news?lang=' + currentLang);
    if (!res.ok) throw new Error('Server returned ' + res.status);
    const data = await res.json();
    const seen = new Set();
    allArticles = (data.items || [])
      .filter(a => { if (seen.has(a.id)) return false; seen.add(a.id); return true; })
      .map(a => ({ ...a, category: currentLang === 'hi' ? '' : guessCategory(a.title, a.description) }));
    document.getElementById('lastUpdated').textContent =
      'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    currentPage = 1; stackIdx = 0; stackHistory = []; showCaughtUp = false;
    renderCards();
  } catch (e) {
    showError(e.message);
  }
  btn.classList.remove('spinning'); btn.disabled = false;
}

// ── Filter ────────────────────────────────────────────────────────────────
function getFiltered() { return activeFilter === 'All' ? allArticles : allArticles.filter(a => a.category === activeFilter); }
function setFilter(cat) { activeFilter = cat; currentPage = 1; stackIdx = 0; stackHistory = []; showCaughtUp = false; renderFilters(); renderCards(); }
function renderFilters() {
  const cats = currentLang === 'hi' ? ['All'] : CATEGORIES;
  document.getElementById('filterRow').innerHTML = cats.map(c =>
    `<button class="pill${c === activeFilter ? ' active' : ''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');
}

// ── Read state ────────────────────────────────────────────────────────────
function markRead(id) {
  readSet.add(id); saveRead();
  const card = document.querySelector(`.card[data-id="${CSS.escape(id)}"]`);
  if (card) { card.classList.remove('unread'); const nb = card.querySelector('.new-badge'); if (nb) nb.remove(); }
  updateUnreadPill();
}
function updateUnreadPill() {
  const n = getFiltered().filter(a => !readSet.has(a.id)).length;
  const el = document.getElementById('unreadPill');
  if (n > 0) { el.style.display = ''; el.textContent = n + ' unread'; } else el.style.display = 'none';
}

// ── Render ────────────────────────────────────────────────────────────────
function renderCards() {
  const filtered = getFiltered(), total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
  if (currentPage > totalPages) currentPage = totalPages;
  document.getElementById('sectionLabel').textContent = activeFilter === 'All'
    ? (currentLang === 'hi' ? 'सभी समाचार' : 'All categories')
    : activeFilter;
  updateUnreadPill();
  const content = document.getElementById('content');
  if (!total) {
    content.innerHTML = `<div class="state-wrap"><div class="state-title">No articles found</div><div class="state-sub">Try a different category or hit Refresh.</div></div>`;
    return;
  }
  const pageItems = filtered.slice((currentPage - 1) * PER_PAGE, currentPage * PER_PAGE);
  const cards = pageItems.map((a, i) => {
    const unread = !readSet.has(a.id), recent = isRecent(a.pubDate), showNew = unread && recent;
    const showCat = currentLang === 'en' && a.category;
    return `<article class="card${unread ? ' unread' : ''}" data-id="${ea(a.id)}"
      style="animation-delay:${i * .04}s" onclick="handleClick('${ej(a.id)}','${ej(a.link)}')">
      <div class="card-top">
        <div class="badges">
          <span class="badge ${eh(a.badgeClass)}">${eh(a.sourceLabel)}</span>
          ${showCat ? `<span class="badge badge-cat">${a.category}</span>` : ''}
        </div>
        ${showNew ? '<span class="new-badge"><span class="new-dot"></span>NEW</span>' : ''}
      </div>
      <div class="card-title">${eh(a.title)}</div>
      ${a.description
        ? `<div class="card-summary">${eh(a.description)}</div>`
        : `<div class="card-summary" style="color:var(--text-muted);font-style:italic;font-size:12px">No preview — click to read full article</div>`
      }
      <div class="card-footer">
        <span class="card-time">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${formatTime(a.pubDate)}
        </span>
        <a class="read-link" href="${safeUrl(a.link)}" target="_blank" rel="noopener"
          onclick="event.stopPropagation(); markRead('${ej(a.id)}')">
          Read full
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    </article>`;
  }).join('');

  let pg = '';
  if (totalPages > 1) {
    pg = `<div class="pagination"><button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← Prev</button>`;
    for (let i = 1; i <= totalPages; i++) {
      if (totalPages <= 7 || i === 1 || i === totalPages || Math.abs(i - currentPage) <= 1)
        pg += `<button class="page-btn${i === currentPage ? ' active' : ''}" onclick="changePage(${i})">${i}</button>`;
      else if (Math.abs(i - currentPage) === 2)
        pg += '<span class="page-ellipsis">…</span>';
    }
    pg += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next →</button></div>`;
  }
  content.innerHTML = `<div class="grid">${cards}</div>${pg}`;
  renderMobileStack();
}

function changePage(p) {
  const tp = Math.ceil(getFiltered().length / PER_PAGE);
  if (p < 1 || p > tp) return;
  currentPage = p; renderCards(); window.scrollTo({ top: 0, behavior: 'smooth' });
}
function handleClick(id, link) { markRead(id); if (/^https?:\/\//i.test(link)) window.open(link, '_blank', 'noopener'); }

// ── State screens ─────────────────────────────────────────────────────────
function showLoading() {
  const sources = currentLang === 'hi' ? 'BBC हिंदी and दैनिक भास्कर' : 'The Hindu and Indian Express';
  const ms = document.getElementById('mobileStack');
  if (ms) ms.innerHTML = '';
  document.getElementById('content').innerHTML = `<div class="state-wrap">
    <div class="spinner"></div>
    <div class="state-title">Fetching latest news…</div>
    <div class="state-sub">Pulling from ${sources}</div>
  </div>`;
}
function showError(msg) {
  document.getElementById('content').innerHTML = `<div class="state-wrap"><div class="error-box">
    <strong>Could not fetch news</strong>
    The news API is temporarily unavailable. Please wait a moment and hit Refresh.<br><br>
    <span style="color:#B45309">Error: ${eh(msg || 'Request failed')}</span>
  </div></div>`;
}

// ── Mobile card stack ────────────────────────────────────────────────────
function cardHTML(a) {
  const unread = !readSet.has(a.id), recent = isRecent(a.pubDate), showNew = unread && recent;
  const showCat = currentLang === 'en' && a.category;
  return `
    <div class="card-top">
      <div class="badges">
        <span class="badge ${a.badgeClass}">${a.sourceLabel}</span>
        ${showCat ? `<span class="badge badge-cat">${a.category}</span>` : ''}
      </div>
      ${showNew ? '<span class="new-badge"><span class="new-dot"></span>NEW</span>' : ''}
    </div>
    <div class="card-title">${eh(a.title)}</div>
    ${a.description
      ? `<div class="card-summary">${eh(a.description)}</div>`
      : `<div class="card-summary" style="color:var(--text-muted);font-style:italic;font-size:12px">No preview — tap Read full</div>`
    }
    <div class="card-footer">
      <span class="card-time">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        ${formatTime(a.pubDate)}
      </span>
      <a class="read-link" href="${ea(a.link)}" target="_blank" rel="noopener"
        onclick="event.stopPropagation(); markRead('${ej(a.id)}')">
        Read full
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>
    </div>
    <div class="swipe-hint">↑ next &nbsp;·&nbsp; ↓ go back</div>`;
}

function renderMobileStack() {
  const el = document.getElementById('mobileStack');
  if (!el) return;
  const filtered = getFiltered();
  if (!filtered.length) { el.innerHTML = ''; return; }

  if (showCaughtUp) {
    const totalNew = filtered.filter(a => isRecent(a.pubDate)).length;
    const older = filtered.length - stackIdx;
    el.innerHTML = `
      <div class="scard-behind scard-b2"></div>
      <div class="scard-behind scard-b1"></div>
      <div class="scard scard-done" id="topScard">
        <div class="done-icon">✓</div>
        <div class="done-title">All new articles read!</div>
        <div class="done-sub">You're caught up on today's news.<br>${older > 0 ? `Swipe ↑ to browse ${older} older article${older !== 1 ? 's' : ''} · ↓ to reread last` : 'Swipe ↓ to reread · refresh for latest news'}</div>
        ${older === 0 ? `<button class="refresh-btn" style="margin:.75rem auto 0;" onclick="loadAll()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Refresh for latest
        </button>` : ''}
      </div>
      <div class="stack-counter">${totalNew} new read · ${older} older remaining</div>`;
    attachSpecialSwipe(
      document.getElementById('topScard'),
      older > 0 ? () => { showCaughtUp = false; renderMobileStack(); } : null,
      stackHistory.length > 0 ? () => { showCaughtUp = false; stackIdx = stackHistory.pop(); renderMobileStack(); } : null
    );
    return;
  }

  if (stackIdx >= filtered.length) {
    el.innerHTML = `
      <div class="scard-behind scard-b2"></div>
      <div class="scard-behind scard-b1"></div>
      <div class="scard scard-done" id="topScard">
        <div class="done-icon">✓</div>
        <div class="done-title">That's everything!</div>
        <div class="done-sub">You've browsed all ${filtered.length} articles.<br>Swipe ↓ to go back or refresh for latest.</div>
        <button class="refresh-btn" style="margin:.75rem auto 0;" onclick="loadAll()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Refresh for latest
        </button>
      </div>
      <div class="stack-counter">${filtered.length} / ${filtered.length}</div>`;
    attachSpecialSwipe(
      document.getElementById('topScard'),
      null,
      stackHistory.length > 0 ? () => { stackIdx = stackHistory.pop(); renderMobileStack(); } : null
    );
    return;
  }

  const a = filtered[stackIdx];
  const unread = !readSet.has(a.id), recent = isRecent(a.pubDate);

  el.innerHTML = `
    <div class="scard-behind scard-b2"></div>
    <div class="scard-behind scard-b1"></div>
    <div class="scard${unread ? ' unread' : ''}" id="topScard">
      ${cardHTML(a)}
    </div>
    <div class="stack-counter">${stackIdx + 1} / ${filtered.length}</div>`;

  attachSwipe(document.getElementById('topScard'), filtered, a);
}

let _ty0 = 0, _tx0 = 0, _dragging = false;

function attachSpecialSwipe(card, onUp, onDown) {
  let ty0 = 0, dragging = false;
  card.addEventListener('touchstart', e => {
    ty0 = e.touches[0].clientY; dragging = true; card.style.transition = 'none';
  }, { passive: true });
  card.addEventListener('touchmove', e => {
    if (!dragging) return;
    const dy = e.touches[0].clientY - ty0;
    e.preventDefault();
    card.style.transform = `translateY(${dy}px) rotate(${dy * 0.04}deg)`;
  }, { passive: false });
  card.addEventListener('touchend', e => {
    if (!dragging) return;
    dragging = false;
    const dy = e.changedTouches[0].clientY - ty0;
    if (dy < -70 && onUp) {
      card.style.transition = 'transform .3s ease, opacity .3s ease';
      card.style.transform = 'translateY(-110vh) rotate(-8deg)';
      card.style.opacity = '0';
      setTimeout(onUp, 280);
    } else if (dy > 70 && onDown) {
      card.style.transition = 'transform .3s ease, opacity .3s ease';
      card.style.transform = 'translateY(110vh) rotate(8deg)';
      card.style.opacity = '0';
      setTimeout(onDown, 280);
    } else {
      card.style.transition = 'transform .25s ease';
      card.style.transform = 'translateY(0) rotate(0)';
    }
  });
}

function attachSwipe(card, filtered, a) {
  card.addEventListener('touchstart', e => {
    _ty0 = e.touches[0].clientY;
    _tx0 = e.touches[0].clientX;
    _dragging = true;
    card.style.transition = 'none';
  }, { passive: true });

  card.addEventListener('touchmove', e => {
    if (!_dragging) return;
    const dy = e.touches[0].clientY - _ty0;
    const dx = e.touches[0].clientX - _tx0;
    if (Math.abs(dy) > Math.abs(dx)) {
      e.preventDefault();
      const rot = dy * 0.04;
      card.style.transform = `translateY(${dy}px) rotate(${rot}deg)`;
    }
  }, { passive: false });

  card.addEventListener('touchend', e => {
    if (!_dragging) return;
    _dragging = false;
    const dy = e.changedTouches[0].clientY - _ty0;
    const THRESHOLD = 70;

    if (dy < -THRESHOLD && stackIdx < filtered.length) {
      const wasNew = !readSet.has(a.id);
      markRead(a.id);
      card.style.transition = 'transform .3s ease, opacity .3s ease';
      card.style.transform = 'translateY(-110vh) rotate(-8deg)';
      card.style.opacity = '0';
      stackHistory.push(stackIdx);
      stackIdx++;
      if (wasNew && getFiltered().filter(x => !readSet.has(x.id)).length === 0) {
        showCaughtUp = true;
      }
      setTimeout(renderMobileStack, 280);
    } else if (dy > THRESHOLD && stackHistory.length > 0) {
      card.style.transition = 'transform .3s ease, opacity .3s ease';
      card.style.transform = 'translateY(110vh) rotate(8deg)';
      card.style.opacity = '0';
      stackIdx = stackHistory.pop();
      setTimeout(renderMobileStack, 280);
    } else {
      card.style.transition = 'transform .25s ease';
      card.style.transform = 'translateY(0) rotate(0)';
    }
  });
}

// ── Escape helpers ────────────────────────────────────────────────────────
function eh(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function ea(s) { return eh(s); }
function ej(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function safeUrl(s) { const u = String(s).trim(); return /^https?:\/\//i.test(u) ? ea(u) : '#'; }

// ── Init ──────────────────────────────────────────────────────────────────
renderLangToggle();
renderFilters();
updateFooter();
loadAll();
setInterval(() => { if (document.visibilityState === 'visible') loadAll(); }, 15 * 60 * 1000);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
}
</script>
